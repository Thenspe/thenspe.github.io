<html>
<head>
<style>
.center {
  text-align: center;
  color: tomato;
}
#double {
  color: #FF00FF;
}
</style>
</head>
<body>

<h1 class="center">Hello World!</h1>

<p class="center">This paragraph is affected by the style.</p>

</body>
</html>
